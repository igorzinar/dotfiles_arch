#    animation = workspacesin, 1, 1.21, almostlinear, fade
#    animation = workspacesout, 1, 1.94, almostlinear, fade
#}
animations {
    #enabled = yes
    enabled = false

    # This curve is smooth but 'grippy'—it stops exactly where it should
    bezier = standard, 0.2, 0, 0, 1

    # 3.2 is a great middle ground for both 27" and 16"
    animation = windows, 1, 3.2, standard, slide
    animation = windowsOut, 1, 3.2, standard, slide
    animation = workspaces, 1, 3.5, standard, slide
    animation = fade, 1, 3, default
}
##############################
### windows and workspaces ###
##############################


# xwaylandvideobridge
windowrulev = opacity 0.0 override, class:^(xwaylandvideobridge)$
windowrulev = animation none, class:^(xwaylandvideobridge)$
windowrulev = initialfocus false, class:^(xwaylandvideobridge)$
windowrulev = size 1 1, class:^(xwaylandvideobridge)$
windowrulev = blur false, class:^(xwaylandvideobridge)$
windowrulev = focusable false, class:^(xwaylandvideobridge)$

# suppress maximize
windowrulev = suppressevent maximize, class:.*

# gromit-mpx
windowrulev = blur false, class:^(gromit-mpx)$
windowrulev = opacity 1.0, class:^(gromit-mpx)$
windowrulev = shadow false, class:^(gromit-mpx)$

# xwayland drag fix
windowrulev = focusable false, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0


# 1. Main Zoom App (Normal floating, but NOT pinned to every workspace)
windowrule = match:class ^(zoom)$, float 1
windowrule = match:class ^(zoom)$, no_blur 1

# 2. The Annotation/Drawing Layer (This is what needs to follow you)
# This allows you to see drawings while you switch workspaces
windowrule = match:title ^(cpt_frame_window)$, float 1
windowrule = match:title ^(cpt_frame_window)$, pin 1
windowrule = match:title ^(cpt_frame_window)$, no_focus 1
windowrule = match:title ^(cpt_frame_window)$, size 100% 100%
windowrule = match:title ^(cpt_frame_window)$, monitor 0

# 3. Meeting Controls (The toolbar)
windowrule = match:title ^(zoom_share_toolbar)$, float 1
windowrule = match:title ^(zoom_share_toolbar)$, pin 1




# see https://wiki.hyprland.org/configuring/dwindle-layout/ for more
dwindle {
    pseudotile = true # master switch for pseudotiling. enabling is bound to mainmod + p in the keybinds section below
    preserve_split = true # you probably want this
}

# see https://wiki.hyprland.org/configuring/master-layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/configuring/variables/#misc
misc {
    force_default_wallpaper = -1 # set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = truen # if true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}


#############
### input ###
#############

# https://wiki.hyprland.org/configuring/variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/configuring/variables/#gestures
#gestures {
